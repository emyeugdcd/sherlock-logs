global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: 
        - '192.168.56.11:9100'
        - '192.168.56.12:9100'
        - '192.168.56.13:9100'
        - '192.168.56.14:9100'
        - '192.168.56.15:9100'
        - '192.168.56.17:9100'

  - job_name: 'cadvisor'
    static_configs:
      - targets:
        - '192.168.56.12:8081'
        - '192.168.56.13:8081'
        - '192.168.56.14:8081'

  - job_name: 'go_backend'
    metrics_path: '/prometheus'
    static_configs:
      - targets:
        - '192.168.56.14:8080'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "alert_rules.yml"
