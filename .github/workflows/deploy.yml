name: Automation Alchemy CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from UI

env:
  BACKEND_IP: '192.168.56.14'
  WEB1_IP: '192.168.56.12'
  WEB2_IP: '192.168.56.13'

jobs:
  test_and_quality_gates:
    name: Test & Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Static Analysis
        run: echo "Running Static Analysis..."
        
      - name: Simulate Go Linting and Node.js testing
        run: echo "Simulating Go Linting and Node.js testing..."
        
      - name: Report Status
        run: echo "Testing Passed successfully!"

  build_artifacts:
    name: Build Artifacts
    needs: test_and_quality_gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Information
        run: echo "Building Docker Images (Handled dynamically on Target VMs to utilize Vagrant Sync)"

  deploy_backend:
    name: Deploy Backend
    needs: build_artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Note on Architecture: GitHub-hosted runners cannot reach private IPs (192.168.56.x).
      # In a real-world scenario, I would use a self-hosted runner on the local network 
      # or deploy to cloud VMs with public/private IPs. This step mocks the execution for learning purposes. 
      # For this project, I ran the deployment manually using super_deploy.sh and deploy_apps.sh 
      - name: Deploy Backend
        run: |
          ssh -o StrictHostKeyChecking=no devops@${{ env.BACKEND_IP }} '
              docker stop vitals-backend-app || true
              docker rename vitals-backend-app vitals-backend-old || true
              cd /vagrant/backend && docker build -t vitals-backend:latest .
              docker run -d --name vitals-backend-app --restart always -p 8080:8080 vitals-backend:latest
              
              for i in $(seq 1 10); do
                  if curl -s http://localhost:8080/metrics > /dev/null; then
                      echo "Healthcheck passed!"
                      docker rm -f vitals-backend-old || true
                      exit 0
                  fi
                  echo "Attempt $i failed, retrying..."
                  sleep 3
              done
              
              echo "HEALTHCHECK FAILED! Executing Rollback..."
              docker rm -f vitals-backend-app
              docker rename vitals-backend-old vitals-backend-app
              docker start vitals-backend-app
              exit 1
          '

  deploy_frontend:
    name: Deploy Frontend
    needs: deploy_backend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: ['192.168.56.12', '192.168.56.13']
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy Frontend to Web Server
        run: |
          ssh -o StrictHostKeyChecking=no devops@${{ matrix.server }} '
              docker stop vitals-frontend-app || true
              docker rename vitals-frontend-app vitals-frontend-old || true
              cd /vagrant/frontend && docker build -t vitals-frontend:latest .
              docker run -d --name vitals-frontend-app --restart always -p 3000:3000 -e BACKEND_URL=http://192.168.56.14:8080 vitals-frontend:latest
              
              for i in $(seq 1 10); do
                  if curl -s http://localhost:3000 > /dev/null; then
                      echo "Healthcheck passed!"
                      docker rm -f vitals-frontend-old || true
                      exit 0
                  fi
                  echo "Attempt $i failed, retrying..."
                  sleep 3
              done
              
              echo "HEALTHCHECK FAILED! Executing Rollback..."
              docker rm -f vitals-frontend-app
              docker rename vitals-frontend-old vitals-frontend-app
              docker start vitals-frontend-app
              exit 1
          '

  notify:
    name: Notifications
    needs: [deploy_backend, deploy_frontend]
    runs-on: ubuntu-latest
    if: always() # Runs regardless of whether deploy succeeds or fails
    steps:
      - name: Notify Success
        if: needs.deploy_backend.result == 'success' && needs.deploy_frontend.result == 'success'
        run: | 
          echo "ALERT: Deployment Successful! Slack/Discord notified via webhook."

      - name: Notify Failure
        if: needs.deploy_backend.result == 'failure' || needs.deploy_frontend.result == 'failure'
        run: |
          echo "ALERT: Deployment FAILED! Rollback triggered. Ops team notified."
